name: Deploy ASP.NET App to Azure

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build and Publish
        run: dotnet publish -c Release -o ${{ github.workspace }}/publish

      - name: List publish folder contents # 👈 Add this
        run: ls -la ${{ github.workspace }}/publish || echo "Publish folder not found!"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "finance-tracker-web-app" # Replace with your App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
