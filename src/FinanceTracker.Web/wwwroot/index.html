<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTracker</title>
    <base href="/" />
    <link href="app.css" rel="stylesheet" />
    <link href="FinanceTracker.Web.styles.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div class="loading-container">Loading FinTracker...</div>
    </div>
    <script>
      window.finTracker = window.finTracker || {};
      window.finTracker.scrollIntoView = function (selector) {
        const element = document.querySelector(selector);
        if (!element) return;
        element.scrollIntoView({ behavior: "smooth", block: "center" });
      };

      window.finTracker.downloadBase64File = function (
        fileName,
        contentType,
        base64Content,
      ) {
        const byteCharacters = atob(base64Content);
        const byteNumbers = new Array(byteCharacters.length);

        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }

        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], {
          type: contentType || "application/octet-stream",
        });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = fileName || "export.bin";
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url);
      };

      window.finTracker.updateTableScrollHints = function () {
        const containers = document.querySelectorAll(
          ".table-wrap, .table-scroll",
        );

        containers.forEach((container) => {
          if (!container.__scrollHintUpdate) {
            container.__scrollHintUpdate = function () {
              const maxScrollLeft =
                container.scrollWidth - container.clientWidth;
              const hasOverflow = maxScrollLeft > 1;
              const atScrollEnd = container.scrollLeft >= maxScrollLeft - 1;

              container.classList.toggle(
                "scroll-hint-active",
                hasOverflow && !atScrollEnd,
              );
            };

            container.addEventListener("scroll", container.__scrollHintUpdate, {
              passive: true,
            });

            if (window.ResizeObserver) {
              const observer = new ResizeObserver(container.__scrollHintUpdate);
              observer.observe(container);
              if (container.firstElementChild) {
                observer.observe(container.firstElementChild);
              }
              container.__scrollHintObserver = observer;
            }
          }

          container.__scrollHintUpdate();
        });
      };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
  </body>
</html>
